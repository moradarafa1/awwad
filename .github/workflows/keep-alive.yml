# Supabase keep-alive — prevents the free project pausing after 7 days idle.
# Add repo secrets: SUPABASE_URL, SUPABASE_ANON_KEY.
# Also set up a 2nd independent pinger (cron-job.org) + UptimeRobot for safety.
name: supabase-keep-alive
on:
  schedule:
    - cron: '17 6 */3 * *' # every 3 days at 06:17 UTC
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase (real SELECT keeps the DB warm)
        run: |
          set -e
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/habit_catalog?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "HTTP $code"
          test "$code" = "200"
