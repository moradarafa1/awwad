<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="36%" r="80%">
      <stop offset="0" stop-color="#182235"/>
      <stop offset="1" stop-color="#0F1420"/>
    </radialGradient>
    <linearGradient id="leafL" x1="640" y1="470" x2="700" y2="330" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="leafR" x1="560" y1="470" x2="500" y2="330" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="230" fill="url(#bg)"/>

  <!-- word عواد: one stroke module (68), shared baseline = soil -->
  <g fill="none" stroke="#2dd4bf" stroke-width="68" stroke-linecap="round" stroke-linejoin="round">
    <!-- baseline / soil -->
    <path d="M236 664H788"/>
    <!-- ain: geometric initial form, rightmost (open eye with a down-hook) -->
    <path d="M846 470V396H762V664"/>
    <path d="M762 528H820"/>
    <!-- alef: tall stem -->
    <path d="M448 300V664"/>
    <!-- dal: final form, leftmost -->
    <path d="M368 468H284V664"/>
    <!-- waw tail below the baseline (root) -->
    <path d="M596 664C592 728 576 762 528 782"/>
  </g>
  <!-- waw head: solid kufi dot -->
  <circle cx="600" cy="600" r="56" fill="#2dd4bf"/>

  <!-- the shadda above the waw IS the sprout: a small stem growing from the
       waw head into two leaves -->
  <path d="M600 546V492" fill="none" stroke="#34d399" stroke-width="26" stroke-linecap="round"/>
  <g>
    <path d="M600 490C592 424 618 380 690 372C694 436 658 480 600 490Z" fill="url(#leafL)"/>
    <path d="M600 490C608 432 586 390 518 384C514 444 546 482 600 490Z" fill="url(#leafR)"/>
  </g>
</svg>
