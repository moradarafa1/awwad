<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Awwad seedling mark, emoji-style (owner request 2026-07-14): a curved
       stem with TWO leaves rising in a V, like the in-app build-track icon.
       Brand greens kept (#9FCE57 / #8FBF44 / stem #5E8A31, veins #C6E58C).
       Content sits inside the adaptive-icon safe zone. -->
  <g>
    <!-- stem -->
    <path d="M 548 872 C 536 792 508 690 501 606"
          fill="none" stroke="#5E8A31" stroke-width="58" stroke-linecap="round"/>
    <!-- left (smaller, darker) leaf -->
    <path d="M 494 602
             C 480 480 424 348 312 284
             C 272 380 308 512 446 588
             C 464 597 482 602 494 602 Z"
          fill="#8FBF44"/>
    <!-- right (larger, lighter) leaf -->
    <path d="M 506 598
             C 518 440 592 268 726 196
             C 772 312 726 486 566 586
             C 544 596 522 601 506 598 Z"
          fill="#9FCE57"/>
    <!-- veins -->
    <path d="M 352 330 C 420 420 466 510 488 578" fill="none"
          stroke="#C6E58C" stroke-width="15" stroke-linecap="round" opacity="0.9"/>
    <path d="M 688 244 C 606 356 540 480 514 574" fill="none"
          stroke="#CBE892" stroke-width="17" stroke-linecap="round" opacity="0.9"/>
    <!-- crown joint -->
    <circle cx="500" cy="596" r="28" fill="#6FA232"/>
  </g>
</svg>
