name: awwad
description: "عوّاد - تطبيق مجاني يساعدك على ترك العادات السيئة وبناء عادات نافعة بأسلوب علمي وقيم إسلامية."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Cloud (P2) — auth + sync. Disabled unless SUPABASE_URL/ANON_KEY are provided
  # via --dart-define, so the app runs fully offline by default.
  supabase_flutter: ^2.8.4

  # Routing
  go_router: ^14.6.2

  # Local persistence (P1 offline source; Drift sync layer lands in P2)
  shared_preferences: ^2.3.3

  # Utilities
  uuid: ^4.5.1
  collection: ^1.19.0

  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.69.2
  confetti: ^0.8.0

  # Misc
  url_launcher: ^6.3.1
  # Online/offline detection (used to hide the suggested-solutions/video card
  # when the device has no connection). Web-safe (navigator.onLine).
  connectivity_plus: ^6.1.0

  # Local notifications (mobile only; web uses a no-op via conditional import)
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
  generate: true   # enables gen-l10n (AppLocalizations)
  assets:
    - assets/logo/sprout.png

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "../assets/icons/icon-1024.png"
  adaptive_icon_background: "#0F1420"
  adaptive_icon_foreground: "../assets/icons/icon-foreground-1024.png"
  web:
    generate: true
    image_path: "../assets/icons/icon-1024.png"
    background_color: "#0D1117"
    theme_color: "#4F8EF7"

flutter_native_splash:
  color: "#0D1117"
  image: "../assets/icons/splash-logo.png"
  android_12:
    color: "#0D1117"
    image: "../assets/icons/splash-logo.png"
