# Supabase keep-alive — prevents the free project from PAUSING after 7 days
# of no DB activity. Copy this file to `.github/workflows/keep-alive.yml` in a
# PUBLIC GitHub repo (public-repo Actions minutes are free).
#
# IMPORTANT (defense in depth): GitHub disables scheduled workflows after 60 days
# of repo inactivity, and cron is best-effort. So ALSO set up a second independent
# pinger (cron-job.org, free) hitting the same URL, AND a free UptimeRobot monitor
# on the health endpoint so you're emailed if the project ever goes down.
#
# No repo secrets required: the project URL and PUBLIC anon key (the same key
# shipped in the app) are embedded as defaults below. You may override them with
# repo secrets SUPABASE_URL / SUPABASE_ANON_KEY. Never put the service_role key here.

name: supabase-keep-alive
on:
  schedule:
    - cron: '17 6 */3 * *' # every 3 days at 06:17 UTC (well under the 7-day limit)
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase (real authenticated SELECT keeps the DB warm)
        run: |
          set -e
          URL="${{ secrets.SUPABASE_URL }}"
          ANON="${{ secrets.SUPABASE_ANON_KEY }}"
          if [ -z "$URL" ]; then URL="https://kdczbzzjezyhfxgpegqc.supabase.co"; fi
          if [ -z "$ANON" ]; then ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtkY3pienpqZXp5aGZ4Z3BlZ3FjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1MzUxNzcsImV4cCI6MjA5ODExMTE3N30.U1EEeJ_kCauZnXWVTlb-Whm5DyEIgGqkwEUpG8pI2vQ"; fi
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "$URL/rest/v1/habit_catalog?select=id&limit=1" \
            -H "apikey: $ANON" \
            -H "Authorization: Bearer $ANON")
          echo "HTTP $code"
          test "$code" = "200"
